name: CI

# Build/typecheck gate so a broken change is caught on the PR before merge.
# (pose-engine ships TS source — no build step — so `check` = svelte-check is the gate.)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    name: Type-check + unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test
